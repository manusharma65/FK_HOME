<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>FK Home · Team chat</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />
<style>
  :root {
    --bg: #FAF7F2; --surface: #FFFFFF; --nav: #14161B; --nav-elev: #1F232B;
    --ink: #14161B; --muted: #6B6760; --soft: #888780;
    --line: rgba(20,22,27,0.12);
    --amber: #EF9F27; --amber-warm: #FAC775; --amber-soft: #FAEEDA;
    --green: #3B6D11; --green-soft: #EAF3DE;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--ink); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  button, input, textarea { font-family: inherit; }

  .topbar {
    background: var(--surface); border-bottom: 0.5px solid var(--line);
    padding: 12px 22px; display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .brand { display: flex; align-items: center; gap: 10px; font-size: 15px; }
  .brand-mark {
    width: 28px; height: 28px; background: var(--nav); border-radius: 7px;
    color: var(--amber); font-weight: 600; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
  }
  .home-link { font-size: 15px; color: var(--muted); padding: 5px 11px; border: 0.5px solid var(--line); border-radius: 99px; cursor: pointer; background: var(--surface); display: flex; align-items: center; gap: 6px; }

  .layout { display: grid; grid-template-columns: 260px 1fr; flex: 1; min-height: 0; }
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .channels-pane.hide-mobile { display: none; }
    .messages-pane.hide-mobile { display: none; }
  }

  /* Channels list */
  .channels-pane {
    background: var(--surface); border-right: 0.5px solid var(--line);
    display: flex; flex-direction: column; min-height: 0;
  }
  .channels-head { padding: 14px 16px; border-bottom: 0.5px solid var(--line); }
  .channels-head h2 { font-size: 15px; font-weight: 500; margin: 0; }
  .channel-section-label {
    font-size: 13px; color: var(--soft); letter-spacing: 0.4px;
    padding: 12px 16px 4px;
  }
  .channels-list { overflow-y: auto; flex: 1; }
  .ch-row {
    display: flex; align-items: center; gap: 9px; padding: 8px 16px;
    cursor: pointer; border-left: 2px solid transparent;
  }
  .ch-row:hover { background: #FBFAF7; }
  .ch-row.on { background: var(--amber-soft); border-left-color: var(--amber); }
  .ch-icon {
    width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--ink);
  }
  .ch-icon.amber { background: var(--amber-soft); }
  .ch-icon.dept { color: #FFFFFF; }
  .ch-info { flex: 1; min-width: 0; }
  .ch-name { font-size: 15px; font-weight: 500; line-height: 1.2; }
  .ch-row.unread .ch-name { font-weight: 600; }
  .ch-preview { font-size: 14px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ch-unread-badge {
    background: var(--amber); color: var(--nav); font-size: 13px; font-weight: 600;
    border-radius: 99px; padding: 2px 7px; min-width: 18px; text-align: center;
  }

  /* Messages */
  .messages-pane { display: flex; flex-direction: column; min-height: 0; background: var(--bg); }
  .msg-head {
    padding: 12px 18px; border-bottom: 0.5px solid var(--line); background: var(--surface);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .msg-head .back-btn { display: none; background: none; border: none; cursor: pointer; padding: 4px; color: var(--muted); }
  @media (max-width: 768px) { .msg-head .back-btn { display: inline-flex; } }
  .msg-head h2 { font-size: 16px; font-weight: 500; margin: 0; }
  .msg-head .sub { font-size: 14px; color: var(--muted); }

  .msg-list { flex: 1; overflow-y: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 8px; }
  .msg-group { display: flex; gap: 10px; }
  .msg-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 500; font-size: 14px; color: var(--ink); flex-shrink: 0;
  }
  .msg-content { flex: 1; min-width: 0; }
  .msg-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
  .msg-sender { font-size: 15px; font-weight: 500; }
  .msg-time { font-size: 13px; color: var(--soft); }
  .msg-body { font-size: 15px; line-height: 1.45; color: var(--ink); word-wrap: break-word; white-space: pre-wrap; }
  .msg-day-divider {
    text-align: center; font-size: 13px; color: var(--soft); margin: 8px 0 4px;
    letter-spacing: 0.4px; text-transform: uppercase;
  }
  .msg-empty { text-align: center; color: var(--muted); font-size: 15px; padding: 32px 16px; }

  .compose {
    border-top: 0.5px solid var(--line); padding: 12px 14px; background: var(--surface);
    display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
  }
  .compose textarea {
    flex: 1; resize: none; border: 0.5px solid var(--line); border-radius: 12px;
    padding: 10px 14px; font-size: 15px; outline: none;
    background: var(--surface); color: var(--ink); max-height: 120px; min-height: 40px;
    line-height: 1.4;
  }
  .compose textarea:focus { border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-soft); }
  .compose button {
    background: var(--nav); color: #FFFFFF; border: none; border-radius: 9px;
    padding: 9px 14px; font-size: 15px; font-weight: 500; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .compose button:disabled { opacity: 0.5; cursor: not-allowed; }

  .empty-channel { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 15px; }

  /* Mobile pass (HR-1) */
  @media (max-width: 768px) {
    .topbar { padding: 10px 14px; }
    .brand span { font-size: 15px; }
    .home-link { padding: 5px 9px; font-size: 14px; }
    .channels-head { padding: 12px 14px; }
    .ch-row { padding: 10px 14px; }
    .msg-head { padding: 10px 14px; }
    .msg-list { padding: 12px 14px; }
    .compose { padding: 10px 12px; gap: 8px; }
    /* iOS Safari auto-zooms inputs with font-size < 16px on focus.
       Use 16px in the composer to prevent that jarring zoom. */
    .compose textarea { font-size: 17px; min-height: 44px; padding: 10px 12px; }
    .compose button { padding: 10px 14px; min-height: 44px; }
    /* Bigger tap targets on channel rows */
    .ch-icon { width: 28px; height: 28px; font-size: 15px; }
    .ch-name { font-size: 16px; }
    .ch-preview { font-size: 15px; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand" onclick="location.href='/'" style="cursor:pointer" title="Back to My FK Space">
      <div class="brand-mark">FK</div>
      <span>FK Home · Team chat</span>
    </div>
  </div>

  <div class="layout">
    <aside class="channels-pane" id="channelsPane">
      <div class="channels-head"><h2>Channels</h2></div>
      <div id="channelsList" class="channels-list">
        <div class="msg-empty" style="padding:24px 16px">Loading…</div>
      </div>
    </aside>
    <main class="messages-pane hide-mobile" id="messagesPane">
      <div class="msg-head">
        <button class="back-btn" onclick="showChannels()"><i class="ti ti-arrow-left"></i></button>
        <div>
          <h2 id="msgChannelName">Select a channel</h2>
          <div class="sub" id="msgChannelSub"></div>
        </div>
      </div>
      <div id="msgList" class="msg-list">
        <div class="msg-empty">Pick a channel to see messages.</div>
      </div>
      <form id="composeForm" class="compose" style="display:none">
        <textarea id="composeInput" placeholder="Type a message…" rows="1"
                  onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();document.getElementById('composeForm').requestSubmit();}"
                  oninput="autoSize(this)"></textarea>
        <button type="submit" id="composeBtn"><i class="ti ti-send"></i> Send</button>
      </form>
    </main>
  </div>

<script>
let channels = [];
let currentChannel = null;
let pollTimer = null;

async function init() {
  const r = await fetch('/api/auth/me', { credentials: 'include' });
  if (!r.ok) { location.href = '/login.html'; return; }
  await loadChannels();
  // If URL has #channel/<id>, open that channel; otherwise open All Hands.
  const hashMatch = (location.hash || '').match(/^#channel\/(\d+)$/);
  if (hashMatch) {
    const wanted = parseInt(hashMatch[1], 10);
    const target = channels.find(c => c.id === wanted);
    if (target) {
      openChannel(target.id);
      startPolling();
      return;
    }
    // Channel not in user's list (e.g. not a member) — fall through to All Hands
  }
  const ah = channels.find(c => c.type === 'all_hands');
  if (ah) openChannel(ah.id);
  startPolling();
}

async function loadChannels() {
  try {
    const r = await fetch('/api/chat/channels', { credentials: 'include' });
    if (!r.ok) return;
    const data = await r.json();
    channels = data.channels || [];
    renderChannels();
  } catch (err) {}
}

function renderChannels() {
  const list = document.getElementById('channelsList');
  if (channels.length === 0) {
    list.innerHTML = '<div class="msg-empty" style="padding:24px 16px">No channels yet.</div>';
    return;
  }
  const groups = {
    all_hands: channels.filter(c => c.type === 'all_hands'),
    department: channels.filter(c => c.type === 'department'),
    dm: channels.filter(c => c.type === 'dm'),
    custom: channels.filter(c => c.type === 'custom'),
  };
  let html = '';
  if (groups.all_hands.length > 0) {
    html += '<div class="channel-section-label">COMPANY</div>';
    html += groups.all_hands.map(channelRow).join('');
  }
  if (groups.department.length > 0) {
    html += '<div class="channel-section-label">DEPARTMENTS</div>';
    html += groups.department.map(channelRow).join('');
  }
  if (groups.dm.length > 0) {
    html += '<div class="channel-section-label">DIRECT MESSAGES</div>';
    html += groups.dm.map(channelRow).join('');
  }
  list.innerHTML = html;
}

function channelRow(c) {
  const isOn = currentChannel === c.id;
  const unread = c.unread_count > 0;
  const icon = c.type === 'all_hands' ? '<i class="ti ti-broadcast"></i>'
            : c.type === 'department' ? `<i class="ti ${c.department_icon || 'ti-users'}"></i>`
            : c.type === 'dm' ? (c.other_user?.initials || '·')
            : '#';
  const iconStyle = c.type === 'department' && c.department_colour
    ? `background:${c.department_colour}; color:#FFFFFF`
    : c.type === 'dm' && c.other_user?.avatar_colour
    ? `background:${c.other_user.avatar_colour}`
    : '';
  const preview = c.last_message
    ? `${escapeHtml(c.last_message.sender_name || 'someone')}: ${escapeHtml((c.last_message.body || '').slice(0, 50))}`
    : 'No messages yet';
  return `
    <div class="ch-row ${isOn ? 'on' : ''} ${unread ? 'unread' : ''}" onclick="openChannel(${c.id})">
      <div class="ch-icon ${c.type === 'all_hands' ? 'amber' : c.type === 'department' ? 'dept' : ''}" style="${iconStyle}">${icon}</div>
      <div class="ch-info">
        <div class="ch-name">${escapeHtml(c.name || 'Channel')}</div>
        <div class="ch-preview">${preview}</div>
      </div>
      ${unread ? `<div class="ch-unread-badge">${c.unread_count > 99 ? '99+' : c.unread_count}</div>` : ''}
    </div>`;
}

function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function openChannel(id) {
  currentChannel = id;
  renderChannels();
  const ch = channels.find(c => c.id === id);
  if (!ch) return;

  document.getElementById('msgChannelName').textContent = ch.name || 'Channel';
  document.getElementById('msgChannelSub').textContent = ch.type === 'all_hands'
    ? 'Everyone is in this channel'
    : ch.type === 'department' ? `${ch.department_name} team`
    : ch.type === 'dm' ? 'Direct message'
    : '';
  document.getElementById('composeForm').style.display = '';

  // Mobile: switch to message view
  if (window.innerWidth <= 768) {
    document.getElementById('channelsPane').classList.add('hide-mobile');
    document.getElementById('messagesPane').classList.remove('hide-mobile');
  }

  await loadMessages(id);
  // Mark read
  fetch(`/api/chat/channels/${id}/read`, { method: 'POST', credentials: 'include' }).catch(()=>{});
  // Refresh channel list to clear unread badge
  setTimeout(loadChannels, 500);
}

function showChannels() {
  document.getElementById('channelsPane').classList.remove('hide-mobile');
  document.getElementById('messagesPane').classList.add('hide-mobile');
}

async function loadMessages(channelId) {
  const list = document.getElementById('msgList');
  list.innerHTML = '<div class="msg-empty">Loading…</div>';
  try {
    const r = await fetch(`/api/chat/channels/${channelId}/messages?limit=50`, { credentials: 'include' });
    if (!r.ok) {
      list.innerHTML = '<div class="msg-empty">Failed to load.</div>';
      return;
    }
    const data = await r.json();
    renderMessages(data.messages || []);
  } catch (err) {
    list.innerHTML = '<div class="msg-empty">Network error.</div>';
  }
}

function renderMessages(messages) {
  const list = document.getElementById('msgList');
  if (messages.length === 0) {
    list.innerHTML = '<div class="msg-empty">No messages yet. Be the first to say something.</div>';
    return;
  }
  let html = '';
  let lastDay = null;
  let lastSender = null;
  let lastTime = 0;
  for (const m of messages) {
    const day = new Date(m.created_at).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short' });
    if (day !== lastDay) {
      html += `<div class="msg-day-divider">${day}</div>`;
      lastDay = day;
      lastSender = null;
    }
    const t = new Date(m.created_at).getTime();
    const showHeader = lastSender !== m.sender_id || (t - lastTime > 300000); // >5 min gap
    if (showHeader) {
      html += `
        <div class="msg-group">
          <div class="msg-avatar" style="background:${m.sender_avatar_colour || '#FAEEDA'}">${escapeHtml(m.sender_initials || '·')}</div>
          <div class="msg-content">
            <div class="msg-meta">
              <span class="msg-sender">${escapeHtml(m.sender_name || m.sender_full_name)}</span>
              <span class="msg-time">${new Date(m.created_at).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })}</span>
            </div>
            <div class="msg-body">${escapeHtml(m.body)}</div>
          </div>
        </div>`;
    } else {
      html += `
        <div class="msg-group">
          <div style="width:32px;flex-shrink:0"></div>
          <div class="msg-content"><div class="msg-body">${escapeHtml(m.body)}</div></div>
        </div>`;
    }
    lastSender = m.sender_id;
    lastTime = t;
  }
  list.innerHTML = html;
  list.scrollTop = list.scrollHeight;
}

document.getElementById('composeForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!currentChannel) return;
  const input = document.getElementById('composeInput');
  const body = input.value.trim();
  if (!body) return;
  const btn = document.getElementById('composeBtn');
  btn.disabled = true;
  try {
    const r = await fetch(`/api/chat/channels/${currentChannel}/messages`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, credentials: 'include',
      body: JSON.stringify({ body })
    });
    if (!r.ok) {
      const data = await r.json();
      alert(data.error || 'Failed');
      return;
    }
    input.value = '';
    autoSize(input);
    await loadMessages(currentChannel);
  } catch (e) { alert('Network error'); }
  finally { btn.disabled = false; }
});

function autoSize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function startPolling() {
  pollTimer = setInterval(() => {
    if (document.hidden) return;
    if (currentChannel) loadMessages(currentChannel);
    loadChannels();
  }, 5000);
}

init();
</script>
</body>
</html>
