<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>FK Home · Sign in</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />
<style>
  :root {
    --bg: #FAF7F2;
    --ink: #14161B;
    --muted: #6B6760;
    --line: rgba(20,22,27,0.12);
    --amber: #EF9F27;
    --amber-soft: #FAEEDA;
    --error: #A32D2D;
    --error-soft: #FCEBEB;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--ink); min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card {
    width: 100%; max-width: 380px;
    background: #FFFFFF; border: 0.5px solid var(--line); border-radius: 16px;
    padding: 32px 28px;
  }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .brand-mark {
    width: 32px; height: 32px; background: var(--ink); border-radius: 8px;
    color: var(--amber); font-weight: 600; font-size: 15px;
    display: flex; align-items: center; justify-content: center; letter-spacing: -0.5px;
  }
  .brand-name { font-size: 17px; font-weight: 500; }
  h1 { font-size: 24px; font-weight: 500; margin: 0 0 4px; letter-spacing: -0.3px; }
  .sub { font-size: 15px; color: var(--muted); margin: 0 0 24px; }
  .field { margin-bottom: 14px; }
  label { display: block; font-size: 15px; color: var(--muted); margin-bottom: 6px; }
  input[type="email"], input[type="password"] {
    width: 100%; padding: 11px 13px; font-size: 16px;
    border: 0.5px solid var(--line); border-radius: 9px;
    background: #FFFFFF; color: var(--ink); outline: none;
  }
  input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-soft); }
  button {
    width: 100%; padding: 12px 14px; font-size: 16px; font-weight: 500;
    background: var(--ink); color: #FFFFFF; border: none; border-radius: 9px;
    cursor: pointer; margin-top: 10px;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .err {
    background: var(--error-soft); color: var(--error); font-size: 15px;
    padding: 10px 12px; border-radius: 8px; margin-bottom: 14px; display: none;
  }
  .err.on { display: block; }
  .foot { margin-top: 22px; font-size: 14px; color: var(--muted); text-align: center; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-mark">FK</div>
      <div class="brand-name">FK Home</div>
    </div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to your space at FK Sports.</p>
    <div id="err" class="err"></div>
    <form id="loginForm" autocomplete="on">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" autofocus />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div style="position:relative">
          <input type="password" id="password" required autocomplete="current-password" style="padding-right:42px" />
          <i class="ti ti-eye" id="pwEye" style="position:absolute;right:12px;top:13px;cursor:pointer;color:var(--muted);font-size:18px" onclick="togglePwEye()"></i>
        </div>
      </div>
      <button type="submit" id="btn">Sign in</button>
    </form>
    <div class="foot">FK Home · r0.13</div>
  </div>
<script>
function togglePwEye() {
  const inp = document.getElementById('password');
  const eye = document.getElementById('pwEye');
  if (inp.type === 'password') {
    inp.type = 'text';
    eye.classList.remove('ti-eye'); eye.classList.add('ti-eye-off');
  } else {
    inp.type = 'password';
    eye.classList.remove('ti-eye-off'); eye.classList.add('ti-eye');
  }
}
const form = document.getElementById('loginForm');
const errBox = document.getElementById('err');
const btn = document.getElementById('btn');
function showError(m){ errBox.textContent = m; errBox.classList.add('on'); }
function clearError(){ errBox.classList.remove('on'); }
form.addEventListener('submit', async (e) => {
  e.preventDefault(); clearError();
  btn.disabled = true; btn.textContent = 'Signing in…';
  
  // Dynamic calculation for device profiling to check workload optimization
  const dynamicDeviceProfile = (window.matchMedia && (window.matchMedia('(max-width: 760px)').matches || window.matchMedia('(pointer: coarse)').matches)) ? 'mobile' : 'desktop';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-fk-device': dynamicDeviceProfile
      },
      credentials: 'include',
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    
    const data = await r.json();
    if (!r.ok) { 
      showError(data.error || 'Login failed'); 
      btn.disabled = false; 
      btn.textContent = 'Sign in'; 
      return; 
    }

    // =========================================================================
    // 🎯 SECURE DATA LOCAL REPOSITORY POPULATION ON SUCCESSFUL AUTHENTICATION
    // =========================================================================
    // Jab user password pass karke successfully auth validation clear karega,
    // usi time hum uski permission identity cache memory mein inject kar denge.
    const bootstrapSessionProfile = {
      user: {
        id: data.user.id,
        name: data.user.name,
        email: data.user.email,
        role: data.user.role || 'agent' // E.g., 'agent', 'team lead', 'manager'
      },
      permissions: {
        // Reassignment authorization is tightly bounded to role condition matrices
        assign: ['lead', 'team lead', 'manager', 'senior'].includes(String(data.user.role).toLowerCase()),
        templates: data.user.permissions?.templates || false,
        manageNotes: data.user.permissions?.manageNotes || false
      }
    };

    // Storing session profile safely so cs.js initialization module reads it immediately
    window.localStorage.setItem('fk_cs_bootstrap', JSON.stringify(bootstrapSessionProfile));
    
    // Redirect cleanly to workspace container
    window.location.href = '/';
    
  } catch (err) {
    showError('Network error. Try again.'); 
    btn.disabled = false; 
    btn.textContent = 'Sign in';
  }
});
</script>
</body>
</html>
