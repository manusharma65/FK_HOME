<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Redirecting…</title>
<script>
// profile.html retired (r0.69). The profile MODULE in the shell replaces it
// (view + edit personal info, pay, time, onboarding, offboarding, reviews).
// Forward any legacy link — /profile.html?id=5#onboarding -> /#profile/5/onboarding —
// so old bookmarks / links never break.
(function () {
  try {
    var params = new URLSearchParams(location.search || '');
    var id = params.get('id');
    var sec = (location.hash || '').replace(/^#/, '').trim();
    var dest = '/#profile' + (id ? '/' + encodeURIComponent(id) : '') + (sec ? '/' + sec : '');
    location.replace(dest);
  } catch (e) {
    location.replace('/#profile');
  }
})();
</script>
</head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;padding:40px;color:#241F1B">
  <p>Taking you to your profile… <a id="lnk" href="/#profile">tap here if it doesn't redirect</a>.</p>
</body>
</html>
