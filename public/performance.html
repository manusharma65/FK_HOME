<!DOCTYPE html>
<!-- CampaignPulse Agent Performance — deploy 2026-05-18 r35.v2 (Same 3 cards, redesigned for visual impact and emotional weight. Card 1: big tier badge with saturated colour, hero "Net £" number prominent, three secondary stats, 8-week sparkline integrated, stakes line below ("X away from Y"). When calibrating shows circular progress dial 0/10 instead of grey "more tasks needed" text. Card 2: wins side gets green saturation, misses get red, £ impact is the dominant typographic element, breakthrough pills feel like medals. Card 3: urgency colour-coded — repeat offender Day 10+ pulses red URGENT, Day 6-7 amber REVIEW SOON, just open neutral. Calm-loud mix: airy spacing throughout, saturated colour only where it carries meaning. Same backend r34 endpoints + r35 tier endpoint. Sparkline data from /api/performance/:agent/trajectory?weeks=8. No new backend.) -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Growth — CampaignPulse</title>
<style>
:root {
  /* Calm base */
  --bg: #fafafa;
  --card: #ffffff;
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
  --border: #e5e7eb;
  --border-strong: #cbd5e1;

  /* Loud accent palette — saturated */
  --accent: #2563eb;

  --excellent: #16a34a;
  --excellent-bg: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
  --excellent-text: #064e3b;
  --excellent-deep: #047857;

  --good: #2563eb;
  --good-bg: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
  --good-text: #1e3a8a;
  --good-deep: #1d4ed8;

  --average: #d97706;
  --average-bg: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
  --average-text: #78350f;
  --average-deep: #b45309;

  --poor: #dc2626;
  --poor-bg: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
  --poor-text: #7f1d1d;
  --poor-deep: #b91c1c;

  --calibrating-bg: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);

  --green: #16a34a;
  --green-bg: #dcfce7;
  --green-text: #166534;
  --red: #dc2626;
  --red-bg: #fee2e2;
  --red-text: #991b1b;
  --amber: #d97706;
  --amber-bg: #fef3c7;
  --amber-text: #92400e;
  --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--text); font: 14px/1.55 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
.wrap { max-width: 1080px; margin: 0 auto; padding: 24px 18px 80px; }

.header { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; }
.header h1 { margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -0.02em; }
.header .sub { color: var(--text3); font-size: 13px; margin-top: 4px; }
.back-link { display: inline-block; margin-bottom: 12px; color: var(--accent); font-size: 13px; text-decoration: none; font-weight: 500; }
.back-link:hover { text-decoration: underline; }
.agent-select { background: white; border: 1px solid var(--border-strong); border-radius: 8px; padding: 6px 10px; font-size: 13px; font-weight: 500; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 18px; }
.card h2 { margin: 0 0 16px; font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
.card h2 .small { color: var(--text3); font-weight: 500; font-size: 13px; margin-left: 8px; }

/* ─── CARD 1: TIER ─── */
.tier-card { padding: 28px; position: relative; overflow: hidden; }
.tier-card.excellent { background: var(--excellent-bg); border-color: rgba(22,163,74,0.25); }
.tier-card.good { background: var(--good-bg); border-color: rgba(37,99,235,0.25); }
.tier-card.average { background: var(--average-bg); border-color: rgba(217,119,6,0.3); }
.tier-card.poor { background: var(--poor-bg); border-color: rgba(220,38,38,0.3); }
.tier-card.calibrating { background: var(--calibrating-bg); border-color: var(--border); }

.tier-top { display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; margin-bottom: 18px; }
.tier-left { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; }

/* Tier label — big and confident */
.tier-label-block { display: flex; flex-direction: column; }
.tier-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; opacity: 0.6; margin-bottom: 4px; }
.tier-label { font-size: 44px; font-weight: 900; letter-spacing: -0.03em; line-height: 1; }
.tier-card.excellent .tier-label, .tier-card.excellent .tier-eyebrow { color: var(--excellent-text); }
.tier-card.good .tier-label, .tier-card.good .tier-eyebrow { color: var(--good-text); }
.tier-card.average .tier-label, .tier-card.average .tier-eyebrow { color: var(--average-text); }
.tier-card.poor .tier-label, .tier-card.poor .tier-eyebrow { color: var(--poor-text); }
.tier-card.calibrating .tier-label, .tier-card.calibrating .tier-eyebrow { color: var(--text2); }

/* Hero number — Net £ */
.tier-hero { text-align: right; }
.tier-hero .v { font-size: 42px; font-weight: 800; font-family: var(--mono); letter-spacing: -0.02em; line-height: 1; }
.tier-hero .v.positive { color: var(--excellent-deep); }
.tier-hero .v.negative { color: var(--poor-deep); }
.tier-hero .l { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text2); margin-top: 6px; font-weight: 700; }

/* Stats row */
.tier-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 6px; }
.tier-stat { background: rgba(255,255,255,0.7); border-radius: 10px; padding: 12px 14px; backdrop-filter: blur(8px); }
.tier-stat .v { font-size: 20px; font-weight: 700; font-family: var(--mono); letter-spacing: -0.02em; }
.tier-stat .l { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; margin-top: 2px; }

/* Sparkline */
.spark-wrap { margin-top: 18px; padding: 14px 16px; background: rgba(255,255,255,0.7); border-radius: 10px; }
.spark-wrap .title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text2); font-weight: 700; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
.spark-wrap svg { width: 100%; height: 50px; display: block; }

/* Stakes line */
.tier-stakes { margin-top: 16px; padding: 12px 16px; background: rgba(255,255,255,0.85); border-radius: 10px; font-size: 14px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 10px; }
.tier-stakes .arrow { font-size: 18px; }
.tier-stakes.up .arrow { color: var(--excellent); }
.tier-stakes.down .arrow { color: var(--poor); }

/* Calibrating state — progress dial */
.calibrating-block { display: flex; align-items: center; gap: 22px; }
.dial { width: 96px; height: 96px; flex-shrink: 0; position: relative; }
.dial svg { transform: rotate(-90deg); }
.dial-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; }
.dial-text .n { font-size: 22px; font-weight: 800; font-family: var(--mono); color: var(--text); }
.dial-text .l { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); font-weight: 700; }
.calibrating-meta { flex: 1; }
.calibrating-meta h3 { margin: 0 0 6px; font-size: 18px; font-weight: 700; }
.calibrating-meta p { margin: 0; font-size: 13px; color: var(--text2); line-height: 1.55; }

/* ─── CARD 2: WINS + MISSES ─── */
.wm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.wm-col h3 { margin: 0 0 12px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 800; display: flex; align-items: center; gap: 6px; }
.wm-col h3.wins { color: var(--excellent-deep); }
.wm-col h3.misses { color: var(--poor-deep); }
.wm-col h3 .icon { font-size: 16px; }

.wm-item { border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; position: relative; }
.wm-item.win { background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%); border: 1px solid rgba(22,163,74,0.2); }
.wm-item.miss { background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%); border: 1px solid rgba(220,38,38,0.2); }
.wm-item .ttl { font-weight: 700; font-size: 14px; margin-bottom: 4px; letter-spacing: -0.01em; }
.wm-item .meta { font-size: 12.5px; color: var(--text2); line-height: 1.55; }
.wm-item .impact-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; gap: 10px; }
.wm-item .impact { font-family: var(--mono); font-weight: 800; font-size: 18px; letter-spacing: -0.02em; }
.wm-item.win .impact { color: var(--excellent-deep); }
.wm-item.miss .impact { color: var(--poor-deep); }
.wm-item .impact-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; opacity: 0.7; }
.wm-item .breakthrough-medal { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 4px 10px; border-radius: 99px; background: var(--excellent); color: white; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.02em; }
.wm-item .coach-note { background: rgba(255,255,255,0.7); border-radius: 8px; padding: 10px 12px; margin-top: 8px; font-size: 12.5px; line-height: 1.55; color: var(--text); }
.wm-empty { font-size: 13px; color: var(--text3); padding: 22px 16px; text-align: center; background: var(--bg); border: 1px dashed var(--border-strong); border-radius: 10px; }

.see-all { margin-top: 16px; text-align: center; }
.see-all a { color: var(--accent); font-size: 13px; text-decoration: none; cursor: pointer; font-weight: 500; }
.see-all a:hover { text-decoration: underline; }

/* ─── CARD 3: TODAY ─── */
.today-list { display: flex; flex-direction: column; gap: 8px; }
.today-item { display: flex; gap: 14px; align-items: center; padding: 12px 16px; border-radius: 12px; transition: transform 0.1s; }
.today-item.urgent { background: linear-gradient(90deg, #fee2e2 0%, #fecaca 100%); border-left: 4px solid var(--poor); animation: pulse 2.5s ease-in-out infinite; }
.today-item.warn { background: linear-gradient(90deg, #fef3c7 0%, #fde68a 100%); border-left: 4px solid var(--amber); }
.today-item.calm { background: var(--bg); border-left: 4px solid var(--border-strong); }
.today-item:hover { transform: translateX(2px); }
.today-item .icon { font-size: 22px; flex-shrink: 0; }
.today-item .body { flex: 1; min-width: 0; }
.today-item .body .ttl { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; }
.today-item .body .meta { font-size: 12.5px; color: var(--text2); margin-top: 2px; }
.today-item .badge { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 6px; letter-spacing: 0.08em; flex-shrink: 0; }
.today-item.urgent .badge { background: var(--poor); color: white; }
.today-item.warn .badge { background: var(--amber); color: white; }
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
  50% { box-shadow: 0 0 0 4px rgba(220,38,38,0.12); }
}
.today-empty { font-size: 14px; color: var(--text2); padding: 26px 20px; text-align: center; background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%); border: 1px solid rgba(22,163,74,0.2); border-radius: 12px; }
.today-empty .icon { font-size: 32px; margin-bottom: 6px; }

/* Drill-down inline */
.drilldown { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.drilldown table { width: 100%; border-collapse: collapse; font-size: 13px; }
.drilldown th, .drilldown td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
.drilldown th { font-size: 11px; text-transform: uppercase; color: var(--text3); font-weight: 700; }
.drilldown td.num { font-family: var(--mono); text-align: right; }
/* r35.13: outcome tabs + period toggle on scored-tasks drill-down */
.scored-controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
.scored-tabs, .scored-period { display: flex; gap: 6px; flex-wrap: wrap; }
.scored-chip { background: #f8fafc; border: 1px solid var(--border); border-radius: 999px; padding: 6px 12px; font-size: 12px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all 0.15s; }
.scored-chip:hover { border-color: var(--border-strong); }
.scored-chip.active { background: var(--text); color: white; border-color: var(--text); }
/* r35.13a: grouped scored-task rows */
.scored-group-row.clickable { cursor: pointer; }
.scored-group-row.clickable:hover { background: #f8fafc; }
.scored-caret { display: inline-block; width: 14px; color: var(--text3); font-size: 11px; }
.scored-count { display: inline-block; background: #fef3c7; color: #78350f; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 999px; margin-left: 6px; }
.scored-problem { display: inline-block; background: #f1f5f9; color: var(--text2); font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 4px; margin-left: 6px; font-family: var(--mono); }
.scored-latest { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
.scored-detail-row { background: #fafafa; }
.scored-detail-cell { padding-left: 28px !important; color: var(--text2); font-size: 12px; font-style: italic; }

/* Header bits */
.agent-select-wrap { display: inline-flex; align-items: center; gap: 8px; background: #fef3c7; border: 1px solid #fcd34d; padding: 6px 12px; border-radius: 10px; }
.agent-select-wrap span { font-size: 12px; font-weight: 700; color: #92400e; letter-spacing: 0.04em; }

.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { color: var(--text3); font-size: 13px; padding: 22px; text-align: center; background: var(--bg); border-radius: 10px; }

@media (max-width: 720px) {
  .tier-top { flex-direction: column; align-items: stretch; }
  .tier-hero { text-align: left; }
  .tier-stats { grid-template-columns: 1fr 1fr; }
  .wm-grid { grid-template-columns: 1fr; }
  .tier-label { font-size: 36px; }
  .tier-hero .v { font-size: 32px; }
}
</style>
</head>
<body>
<div class="wrap">
  <a href="/shell.html" class="back-link" id="back-link" style="display:none">← Back to dashboard</a>

  <div class="header">
    <div>
      <h1 id="page-title">My Growth</h1>
      <div class="sub" id="page-sub">Rolling 30 days</div>
    </div>
    <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap">
      <div id="agent-select-wrap" class="agent-select-wrap" style="display:none">
        <span>VIEWING</span>
        <select id="agent-select" class="agent-select" onchange="onAgentChange()"></select>
      </div>
    </div>
  </div>

  <!-- CARD 1: Tier -->
  <div class="card tier-card calibrating" id="tier-card-wrap">
    <div id="tier-body"><div class="empty"><span class="spinner"></span> Loading…</div></div>
  </div>

  <!-- CARD 2: Wins + Misses -->
  <div class="card" id="wm-card">
    <h2>What worked, what didn't <span class="small">— last 30 days</span></h2>
    <div id="wm-body"><div class="empty"><span class="spinner"></span> Loading…</div></div>
  </div>

  <!-- CARD 3: Today -->
  <div class="card" id="today-card">
    <h2>Today <span class="small">— needs your attention</span></h2>
    <div id="today-body"><div class="empty"><span class="spinner"></span> Loading…</div></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────
// State + bootstrap
// ─────────────────────────────────────────────────────────────────────────
let currentAgent = '';
let isManager = false;

function getToken() { return localStorage.getItem('cp_token') || ''; }
async function authedFetch(url, opts) {
  opts = opts || {};
  opts.headers = Object.assign({}, opts.headers || {}, { 'x-auth-token': getToken() });
  if (opts.method && opts.method !== 'GET' && !opts.headers['Content-Type']) opts.headers['Content-Type'] = 'application/json';
  return await fetch(url, opts);
}
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
function fmtMoneyShort(n) {
  if (n == null || isNaN(n)) return '—';
  const v = parseFloat(n);
  const sign = v < 0 ? '−' : (v > 0 ? '+' : '');
  return sign + '£' + Math.abs(Math.round(v)).toLocaleString('en-GB');
}
function fmtPct(n, decimals) {
  if (n == null || isNaN(n)) return '—';
  return (parseFloat(n) * 100).toFixed(decimals != null ? decimals : 0) + '%';
}
function fmtAcosPct(n) {
  if (n == null || isNaN(n)) return '—';
  // r35.13: 99 is the server-side sentinel for "spend with zero sales" (i.e.
  // infinite ACOS). Stored as 99 because the breakthrough rule needs a numeric
  // comparison; rendered here as "no sales" so the team doesn't see 9900%.
  const v = parseFloat(n);
  if (v >= 99) return 'no sales';
  return (v * 100).toFixed(0) + '%';
}
function relDate(s) {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d.getTime())) return '';
  const diffDays = Math.floor((Date.now() - d.getTime()) / 86400000);
  if (diffDays === 0) return 'today';
  if (diffDays === 1) return 'yesterday';
  if (diffDays < 7) return diffDays + ' days ago';
  if (diffDays < 14) return 'last week';
  if (diffDays < 30) return Math.floor(diffDays / 7) + ' weeks ago';
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

async function init() {
  let me = null;
  try {
    const r = await authedFetch('/api/auth/me');
    if (r.ok) me = await r.json();
  } catch(e) {}
  if (!me || !me.name) {
    window.location.href = '/login.html';
    return;
  }
  const myRole = String(me.role || '').toLowerCase();
  const myDept = String(me.department || '').toLowerCase();
  isManager = ['owner','manager','admin'].indexOf(myRole) !== -1 || myDept === 'manager';

  const isPpcDept = ['amazon', 'google'].indexOf(myDept) !== -1;
  if (!isManager && !isPpcDept) {
    document.querySelector('.wrap').innerHTML =
      '<div class="card" style="text-align:center; padding:48px 24px">' +
        '<div style="font-size:36px; margin-bottom:12px">📊</div>' +
        '<h2 style="margin:0 0 8px">Not available for ' + esc(me.department || 'your department') + '</h2>' +
        '<p style="color:var(--text2); max-width:520px; margin:0 auto">My Growth measures PPC campaign performance (Amazon and Google Ads). Your role has different KPIs.</p>' +
        '<p style="margin-top:24px"><a href="/shell.html" class="back-link" style="display:inline-block">← Back to your dashboard</a></p>' +
      '</div>';
    return;
  }

  if (isManager) {
    document.getElementById('back-link').style.display = 'inline-block';
    const wrap = document.getElementById('agent-select-wrap');
    const sel = document.getElementById('agent-select');
    wrap.style.display = 'inline-flex';
    try {
      const r = await authedFetch('/api/performance/_agents');
      const j = await r.json();
      (j.agents || []).forEach(function(a){
        const opt = document.createElement('option');
        opt.value = a.agent_name;
        opt.textContent = a.agent_name + (a.n ? ' (' + a.n + ')' : '');
        sel.appendChild(opt);
      });
      currentAgent = (j.agents || []).find(function(a){ return a.agent_name === me.name; })
        ? me.name : ((j.agents || [])[0] && j.agents[0].agent_name) || me.name;
      sel.value = currentAgent;
    } catch(e) {
      currentAgent = me.name;
    }
    document.getElementById('page-title').textContent = currentAgent + ' — Growth';
    document.getElementById('page-sub').textContent = 'Manager view · rolling 30 days';
  } else {
    currentAgent = me.name;
    document.getElementById('page-title').textContent = 'My Growth';
    document.getElementById('page-sub').textContent = 'Your performance · rolling 30 days';
  }

  loadAll();
}

function onAgentChange() {
  currentAgent = document.getElementById('agent-select').value;
  document.getElementById('page-title').textContent = currentAgent + ' — Growth';
  loadAll();
}

async function loadAll() {
  await Promise.all([loadTier(), loadWinsAndMisses(), loadToday()]);
}

// ─────────────────────────────────────────────────────────────────────────
// CARD 1: Tier — calm-loud, sparkline, hero £
// ─────────────────────────────────────────────────────────────────────────
async function loadTier() {
  const card = document.getElementById('tier-card-wrap');
  const body = document.getElementById('tier-body');
  body.innerHTML = '<div class="empty"><span class="spinner"></span> Loading…</div>';
  try {
    const [tierRes, trajRes] = await Promise.all([
      authedFetch('/api/performance/' + encodeURIComponent(currentAgent) + '/tier'),
      authedFetch('/api/performance/' + encodeURIComponent(currentAgent) + '/trajectory?weeks=8')
    ]);
    if (!tierRes.ok) throw new Error('HTTP ' + tierRes.status);
    const j = await tierRes.json();
    const traj = trajRes.ok ? await trajRes.json() : { weeks: [] };
    const t = j.tier || {};
    const isCalibrating = t.calibrating;

    // Update card colour class
    card.className = 'card tier-card ' + (t.tier || 'calibrating');

    if (isCalibrating) {
      const have = Math.max(0, 10 - (t.needed || 10));
      const need = t.needed || 10;
      const pct = have / 10;
      // SVG progress dial — circumference 2πr where r=44 → 276.46
      const C = 276.46;
      const dashOffset = C - (C * pct);
      body.innerHTML =
        '<div class="calibrating-block">' +
          '<div class="dial">' +
            '<svg width="96" height="96" viewBox="0 0 96 96">' +
              '<circle cx="48" cy="48" r="44" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="8"/>' +
              '<circle cx="48" cy="48" r="44" fill="none" stroke="var(--accent)" stroke-width="8" stroke-linecap="round" stroke-dasharray="' + C + '" stroke-dashoffset="' + dashOffset.toFixed(2) + '"/>' +
            '</svg>' +
            '<div class="dial-text"><div class="n">' + have + '/10</div><div class="l">scored</div></div>' +
          '</div>' +
          '<div class="calibrating-meta">' +
            '<h3>Calibrating your tier</h3>' +
            '<p>Your tier appears once 10 of your completed tasks have had 7 days to play out. ' +
            '<strong>' + need + ' more</strong> to go. Keep closing tasks — the data is building.</p>' +
          '</div>' +
        '</div>';
      return;
    }

    // Tier is real — build hero layout
    const netClass = (j.netImpactGbp || 0) >= 0 ? 'positive' : 'negative';
    const sparkHtml = renderSparkline(traj.weeks || []);

    // Stakes line — "X away from Y"
    let stakesHtml = '';
    const sr = (j.successRate || 0) * 100;
    if (t.tier === 'poor') {
      const gap = Math.max(0, 50 - sr).toFixed(1);
      stakesHtml = '<div class="tier-stakes"><span class="arrow">⚠️</span><strong>' + gap + '% points</strong> away from Average — focus on what didn\'t work below.</div>';
    } else if (t.tier === 'average') {
      const gap = Math.max(0, 60 - sr).toFixed(1);
      stakesHtml = '<div class="tier-stakes up"><span class="arrow">↗</span><strong>' + gap + '% points</strong> away from Good — keep your fixes sticking.</div>';
    } else if (t.tier === 'good') {
      const gap = Math.max(0, 80 - sr).toFixed(1);
      stakesHtml = '<div class="tier-stakes up"><span class="arrow">↗</span><strong>' + gap + '% points</strong> away from Excellent.</div>';
    } else if (t.tier === 'excellent') {
      stakesHtml = '<div class="tier-stakes up"><span class="arrow">🎯</span>Top tier. Maintain this and you\'re shaping the team\'s benchmark.</div>';
    }

    // Movement override on stakes line
    if (j.movement === 'down') {
      stakesHtml = '<div class="tier-stakes down"><span class="arrow">↘</span>Dropped from <strong>' + (j.priorTier && j.priorTier.label || 'previous') + '</strong> last month — see misses below.</div>' + stakesHtml;
    } else if (j.movement === 'up') {
      stakesHtml = '<div class="tier-stakes up"><span class="arrow">↗</span>Up from <strong>' + (j.priorTier && j.priorTier.label || 'previous') + '</strong> last month — nice work.</div>' + stakesHtml;
    }

    body.innerHTML =
      '<div class="tier-top">' +
        '<div class="tier-left">' +
          '<div class="tier-label-block">' +
            '<div class="tier-eyebrow">Current tier</div>' +
            '<div class="tier-label">' + esc(t.label) + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="tier-hero">' +
          '<div class="v ' + netClass + '">' + fmtMoneyShort(j.netImpactGbp) + '</div>' +
          '<div class="l">Net £ contribution · 30d</div>' +
        '</div>' +
      '</div>' +
      '<div class="tier-stats">' +
        '<div class="tier-stat"><div class="v">' + fmtPct(j.successRate, 0) + '</div><div class="l">Success rate</div></div>' +
        '<div class="tier-stat"><div class="v">' + (j.scoredCount || 0) + '</div><div class="l">Scored tasks</div></div>' +
        '<div class="tier-stat"><div class="v">' + (j.movement === 'up' ? '↗' : j.movement === 'down' ? '↘' : '→') + '</div><div class="l">vs last month</div></div>' +
      '</div>' +
      sparkHtml +
      stakesHtml;
  } catch(e) {
    body.innerHTML = '<div class="empty">Could not load tier: ' + esc(e.message) + '</div>';
  }
}

function renderSparkline(weeks) {
  if (!weeks || !weeks.length) return '';
  const points = weeks.filter(function(w){ return w.successRate != null; });
  if (points.length < 2) {
    return '<div class="spark-wrap"><div class="title"><span>8-week success trajectory</span><span style="color:var(--text3);font-weight:500">Building…</span></div>' +
      '<div style="font-size:12px;color:var(--text3);text-align:center;padding:12px 0">Need at least 2 weeks of scored data to draw the line.</div></div>';
  }
  const w = 600, h = 50, padL = 4, padR = 4, padT = 6, padB = 6;
  const xStep = (w - padL - padR) / Math.max(points.length - 1, 1);
  const ys = points.map(function(p){ return parseFloat(p.successRate) || 0; });
  const yMin = Math.min(...ys);
  const yMax = Math.max(...ys);
  const yRange = (yMax - yMin) || 0.1;
  const yScale = function(v){
    return padT + ((yMax - v) / yRange) * (h - padT - padB);
  };
  const pts = points.map(function(p, i){ return [padL + i * xStep, yScale(p.successRate), p]; });
  const linePath = pts.map(function(p, i){ return (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1); }).join(' ');
  // Area under line
  const areaPath = linePath + ' L' + pts[pts.length-1][0].toFixed(1) + ',' + h + ' L' + pts[0][0].toFixed(1) + ',' + h + ' Z';
  const lastPt = pts[pts.length - 1];
  const latestPct = (points[points.length-1].successRate * 100).toFixed(0) + '%';
  const earliestPct = (points[0].successRate * 100).toFixed(0) + '%';

  return '<div class="spark-wrap">' +
    '<div class="title"><span>' + points.length + '-week success trajectory</span>' +
      '<span style="color:var(--text2);font-weight:500"><span style="color:var(--text3)">' + earliestPct + '</span> → <strong>' + latestPct + '</strong></span></div>' +
    '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
      '<path d="' + areaPath + '" fill="currentColor" opacity="0.15"/>' +
      '<path d="' + linePath + '" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>' +
      '<circle cx="' + lastPt[0].toFixed(1) + '" cy="' + lastPt[1].toFixed(1) + '" r="4" fill="currentColor"/>' +
    '</svg>' +
  '</div>';
}

// ─────────────────────────────────────────────────────────────────────────
// CARD 2: Wins + Misses
// ─────────────────────────────────────────────────────────────────────────
async function loadWinsAndMisses() {
  const body = document.getElementById('wm-body');
  body.innerHTML = '<div class="empty"><span class="spinner"></span> Loading…</div>';
  try {
    const [winsRes, missesRes] = await Promise.all([
      authedFetch('/api/performance/' + encodeURIComponent(currentAgent) + '/wins?limit=3&period=30d'),
      authedFetch('/api/performance/' + encodeURIComponent(currentAgent) + '/mistakes-mirror?limit=3')
    ]);
    const winsJson = winsRes.ok ? await winsRes.json() : { wins: [] };
    const missesJson = missesRes.ok ? await missesRes.json() : { repeats: [] };
    const wins = winsJson.wins || [];
    const misses = missesJson.repeats || [];

    const winsHtml = wins.length === 0
      ? '<div class="wm-empty">No meaningful wins yet — give it a few more days as tasks settle.</div>'
      : wins.map(function(w){
          const isBreakthrough = w.outcome === 'breakthrough';
          const acosLine = (w.before_acos != null && w.after_acos != null)
            ? 'ACOS ' + fmtAcosPct(w.before_acos) + ' → ' + fmtAcosPct(w.after_acos)
            : '';
          const datePart = w.scored_at ? esc(relDate(w.scored_at)) : '';
          const impact = w.efficiency_gain_gbp ? Math.round(parseFloat(w.efficiency_gain_gbp)) : 0;
          return '<div class="wm-item win">' +
            (isBreakthrough ? '<div class="breakthrough-medal">🎯 BREAKTHROUGH</div>' : '') +
            '<div class="ttl">' + esc(w.campaign_name || '?') + '</div>' +
            '<div class="meta">' + esc(acosLine) + (datePart ? ' · ' + datePart : '') + '</div>' +
            (impact > 0 ? '<div class="impact-row"><div class="impact">+£' + impact.toLocaleString('en-GB') + '</div><div class="impact-label">saved</div></div>' : '') +
          '</div>';
        }).join('');

    const missesHtml = misses.length === 0
      ? '<div class="wm-empty">No repeat failures detected. Either your fixes are sticking, or not enough completions yet.</div>'
      : misses.map(function(m){
          const gap = m.repeat_gap_waste_gbp ? Math.round(parseFloat(m.repeat_gap_waste_gbp)) : 0;
          const datePart = m.scored_at ? esc(relDate(m.scored_at)) : '';
          return '<div class="wm-item miss">' +
            '<div class="ttl">' + esc(m.campaign_name || '?') + '</div>' +
            '<div class="meta">' + esc(m.problem_type || '') + (datePart ? ' · ' + datePart : '') + '</div>' +
            (gap > 0 ? '<div class="impact-row"><div class="impact">−£' + gap.toLocaleString('en-GB') + '</div><div class="impact-label">wasted in gap</div></div>' : '') +
            (m.mistake_mirror_note ? '<div class="coach-note">💡 ' + esc(m.mistake_mirror_note) + '</div>' : '') +
          '</div>';
        }).join('');

    body.innerHTML =
      '<div class="wm-grid">' +
        '<div class="wm-col"><h3 class="wins"><span class="icon">🟢</span> What worked</h3>' + winsHtml + '</div>' +
        '<div class="wm-col"><h3 class="misses"><span class="icon">🔴</span> What didn\'t</h3>' + missesHtml + '</div>' +
      '</div>' +
      '<div class="see-all"><a onclick="toggleAllScored()">See all scored tasks →</a></div>' +
      '<div id="all-scored" class="drilldown" style="display:none"></div>';
  } catch(e) {
    body.innerHTML = '<div class="empty">Could not load: ' + esc(e.message) + '</div>';
  }
}

// r35.13: cache scored-tasks per period so tab/period changes don't re-fetch.
// Shape: { '7d': [tasks], '30d': [tasks] }
const scoredCache = {};
let scoredFilter = 'all';      // all | breakthrough | improved | flat | worsened
let scoredPeriod = '30d';      // 7d | 30d

async function toggleAllScored() {
  const box = document.getElementById('all-scored');
  if (!box) return;
  if (box.style.display !== 'none') {
    box.style.display = 'none';
    return;
  }
  box.style.display = 'block';
  await renderScoredTasks();
}

async function setScoredFilter(f) {
  scoredFilter = f;
  await renderScoredTasks();
}

async function setScoredPeriod(p) {
  scoredPeriod = p;
  await renderScoredTasks();
}

async function loadScoredForPeriod(period) {
  if (scoredCache[period]) return scoredCache[period];
  const outcomes = ['breakthrough','improved','flat','worsened'];
  const responses = await Promise.all(outcomes.map(function(o){
    return authedFetch('/api/performance/' + encodeURIComponent(currentAgent) + '/scored-tasks?outcome=' + o + '&period=' + period).then(function(r){ return r.ok ? r.json() : { tasks: [] }; });
  }));
  const allTasks = [];
  responses.forEach(function(resp, i){
    (resp.tasks || []).forEach(function(t){ t._outcome = outcomes[i]; allTasks.push(t); });
  });
  allTasks.sort(function(a,b){ return new Date(b.scored_at) - new Date(a.scored_at); });
  scoredCache[period] = allTasks;
  return allTasks;
}

async function renderScoredTasks() {
  const box = document.getElementById('all-scored');
  if (!box) return;
  box.innerHTML = '<div class="empty"><span class="spinner"></span> Loading…</div>';
  try {
    const allTasks = await loadScoredForPeriod(scoredPeriod);

    // Counts per outcome (for tab labels) — computed on the full period set
    const counts = { all: allTasks.length, breakthrough: 0, improved: 0, flat: 0, worsened: 0 };
    allTasks.forEach(function(t){ if (counts[t._outcome] != null) counts[t._outcome]++; });

    // Build filter chips (outcome tabs + period toggle)
    const chip = function(label, key, active, handler) {
      return '<button class="scored-chip' + (active ? ' active' : '') + '" onclick="' + handler + '(\'' + key + '\')">' + label + '</button>';
    };
    const tabsHtml =
      '<div class="scored-controls">' +
        '<div class="scored-tabs">' +
          chip('All (' + counts.all + ')', 'all', scoredFilter === 'all', 'setScoredFilter') +
          chip('🎯 Breakthrough (' + counts.breakthrough + ')', 'breakthrough', scoredFilter === 'breakthrough', 'setScoredFilter') +
          chip('✅ Improved (' + counts.improved + ')', 'improved', scoredFilter === 'improved', 'setScoredFilter') +
          chip('➖ Flat (' + counts.flat + ')', 'flat', scoredFilter === 'flat', 'setScoredFilter') +
          chip('❌ Worsened (' + counts.worsened + ')', 'worsened', scoredFilter === 'worsened', 'setScoredFilter') +
        '</div>' +
        '<div class="scored-period">' +
          chip('7 days', '7d', scoredPeriod === '7d', 'setScoredPeriod') +
          chip('30 days', '30d', scoredPeriod === '30d', 'setScoredPeriod') +
        '</div>' +
      '</div>';

    // Filter by active outcome
    const filtered = scoredFilter === 'all' ? allTasks : allTasks.filter(function(t){ return t._outcome === scoredFilter; });

    if (!filtered.length) {
      const label = scoredFilter === 'all' ? 'scored tasks' : scoredFilter + ' tasks';
      box.innerHTML = tabsHtml + '<div class="empty">No ' + label + ' in the last ' + scoredPeriod + '.</div>';
      return;
    }

    // r35.13a: group by campaign + problem_type + outcome to collapse
    // recurring tasks into one row. Today's r34 backfill scored months of
    // historical tasks in one batch, so a campaign that hit the same problem
    // 4 times shows 4 identical-looking rows. Grouping makes the pattern
    // clear ("budget_low ×4 — fixed 4 times, kept coming back") instead of
    // looking like a duplicate-rows bug.
    const groupMap = {};
    filtered.forEach(function(t){
      const key = (t.campaign_name || '?') + '||' + (t.problem_type || '') + '||' + t._outcome;
      if (!groupMap[key]) {
        groupMap[key] = { key: key, campaign: t.campaign_name || '?', problem_type: t.problem_type || '', outcome: t._outcome, tasks: [] };
      }
      groupMap[key].tasks.push(t);
    });
    const groups = Object.values(groupMap);
    // Sort groups by most recent scored_at within the group
    groups.forEach(function(g){ g.tasks.sort(function(a,b){ return new Date(b.scored_at) - new Date(a.scored_at); }); });
    groups.sort(function(a,b){ return new Date(b.tasks[0].scored_at) - new Date(a.tasks[0].scored_at); });

    const iconFor = function(o){ return o === 'breakthrough' ? '🎯' : o === 'improved' ? '✅' : o === 'worsened' ? '❌' : '➖'; };
    const impactFor = function(t){
      return (t._outcome === 'breakthrough' || t._outcome === 'improved') ? (t.efficiency_gain_gbp || 0)
           : t._outcome === 'worsened' ? -(t.worsened_waste_gbp || 0)
           : 0;
    };

    let html = tabsHtml + '<table><thead><tr>' +
      '<th>Campaign</th><th>Outcome</th><th class="num">ACOS before</th><th class="num">ACOS after</th><th class="num">£ impact</th><th>Date</th>' +
      '</tr></thead><tbody>';
    groups.forEach(function(g, gi){
      const n = g.tasks.length;
      const latest = g.tasks[0];
      const totalImpact = g.tasks.reduce(function(s,t){ return s + impactFor(t); }, 0);
      const icon = iconFor(g.outcome);
      const problemBadge = g.problem_type ? ' <span class="scored-problem">' + esc(g.problem_type) + '</span>' : '';
      const countBadge = n > 1 ? ' <span class="scored-count">×' + n + '</span>' : '';
      const expandable = n > 1;
      const rowId = 'sg-' + gi;

      // Header row (always shown). If group has >1, clicking toggles detail rows.
      html += '<tr class="scored-group-row' + (expandable ? ' clickable' : '') + '"' + (expandable ? ' onclick="toggleScoredGroup(\'' + rowId + '\')"' : '') + '>' +
        '<td>' + (expandable ? '<span class="scored-caret" id="' + rowId + '-caret">▸</span> ' : '') + esc(g.campaign) + problemBadge + countBadge + '</td>' +
        '<td>' + icon + ' ' + esc(g.outcome) + '</td>' +
        '<td class="num">' + (n > 1 ? '—' : fmtAcosPct(latest.before_acos)) + '</td>' +
        '<td class="num">' + (n > 1 ? '—' : fmtAcosPct(latest.after_acos)) + '</td>' +
        '<td class="num">' + (totalImpact === 0 ? '—' : fmtMoneyShort(totalImpact)) + '</td>' +
        '<td>' + esc(relDate(latest.scored_at)) + (n > 1 ? ' <span class="scored-latest">latest</span>' : '') + '</td>' +
      '</tr>';

      if (expandable) {
        g.tasks.forEach(function(t, ti){
          const impact = impactFor(t);
          html += '<tr class="scored-detail-row" data-group="' + rowId + '" style="display:none">' +
            '<td class="scored-detail-cell">↳ attempt ' + (n - ti) + ' of ' + n + '</td>' +
            '<td>' + icon + ' ' + esc(t._outcome) + '</td>' +
            '<td class="num">' + fmtAcosPct(t.before_acos) + '</td>' +
            '<td class="num">' + fmtAcosPct(t.after_acos) + '</td>' +
            '<td class="num">' + (impact === 0 ? '—' : fmtMoneyShort(impact)) + '</td>' +
            '<td>' + esc(relDate(t.scored_at)) + '</td>' +
          '</tr>';
        });
      }
    });
    html += '</tbody></table>';
    box.innerHTML = html;
  } catch(e) {
    box.innerHTML = '<div class="empty">Could not load drill-down: ' + esc(e.message) + '</div>';
  }
}

function toggleScoredGroup(rowId) {
  const rows = document.querySelectorAll('tr.scored-detail-row[data-group="' + rowId + '"]');
  const caret = document.getElementById(rowId + '-caret');
  if (!rows.length) return;
  const isHidden = rows[0].style.display === 'none';
  rows.forEach(function(r){ r.style.display = isHidden ? 'table-row' : 'none'; });
  if (caret) caret.textContent = isHidden ? '▾' : '▸';
}

// ─────────────────────────────────────────────────────────────────────────
// CARD 3: Today — urgency-coded
// ─────────────────────────────────────────────────────────────────────────
async function loadToday() {
  const body = document.getElementById('today-body');
  body.innerHTML = '<div class="empty"><span class="spinner"></span> Loading…</div>';
  try {
    const r = await authedFetch('/api/performance/' + encodeURIComponent(currentAgent) + '/daily-brief');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    const items = j.needsAttention || [];
    if (!items.length) {
      body.innerHTML = '<div class="today-empty"><div class="icon">✨</div><strong>All clear.</strong><br>No urgent tasks — you\'re on top of things.</div>';
      return;
    }
    body.innerHTML = '<div class="today-list">' + items.map(function(t){
      const days = Math.floor(parseFloat(t.days_open_calendar || 0));
      const isRepeat = !!t.is_repeat_offender;
      // Urgency: repeat offender on day 10+ = urgent. Just-repeat or day 6+ = warn. else calm.
      let cls, icon, badge, subtitle;
      if (isRepeat && days >= 10) {
        cls = 'urgent'; icon = '🚨'; badge = 'URGENT';
        subtitle = 'Repeat offender, day ' + days + ' — needs a different angle, not the same fix';
      } else if (isRepeat) {
        cls = 'urgent'; icon = '🔁'; badge = 'REPEAT';
        subtitle = 'Failed ' + (t.failure_count || '?') + ' times — try a structural change';
      } else if (days >= 6) {
        cls = 'warn'; icon = '⏰'; badge = 'REVIEW SOON';
        subtitle = 'Day ' + days + ' — review approaching';
      } else {
        cls = 'calm'; icon = '📋'; badge = '';
        subtitle = 'Day ' + days;
      }
      return '<div class="today-item ' + cls + '">' +
        '<div class="icon">' + icon + '</div>' +
        '<div class="body">' +
          '<div class="ttl">' + esc(t.campaign_name || '?') + '</div>' +
          '<div class="meta">' + esc(subtitle) + '</div>' +
        '</div>' +
        (badge ? '<div class="badge">' + badge + '</div>' : '') +
      '</div>';
    }).join('') + '</div>';
  } catch(e) {
    body.innerHTML = '<div class="empty">Could not load today: ' + esc(e.message) + '</div>';
  }
}
