<!DOCTYPE html>
<!-- CampaignPulse Logistics — public freight agent portal (r31l) — clear plan info header + delivery booking English-only -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FK Sports — Freight Request / 货运请求</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif; background: #f7f7f8; color: #111; min-height: 100vh; font-size: 14px; }
.topbar { background: #000; color: white; padding: 8px 24px; font-size: 11px; display: flex; justify-content: space-between; align-items: center; letter-spacing: 0.02em; }
.topbar .left { font-weight: 500; }
.topbar .right { opacity: 0.65; }
.logobar { background: white; padding: 14px 24px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid #ececec; }
.logobar img { height: 52px; width: auto; }
.logobar .tag { font-size: 11px; color: #6b7280; font-weight: 500; letter-spacing: 0.02em; padding-left: 14px; border-left: 1px solid #ececec; }
.wrap { max-width: 1100px; margin: 0 auto; padding: 24px 16px 32px; }
.card { background: white; border-radius: 10px; padding: 22px 24px; border: 1px solid #ececec; margin-bottom: 16px; }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.2px; }
h1 .cn { font-size: 15px; font-weight: 400; color: #6b7280; margin-left: 8px; }
.intro { font-size: 13px; color: #6b7280; margin-bottom: 18px; line-height: 1.5; }
.intro .cn { display: block; margin-top: 4px; color: #6b7280; }
.banner { color: white; padding: 14px 18px; border-radius: 8px; margin-bottom: 16px; }
.banner-q { background: #111; }
.banner-d { background: #E63946; }
.banner .who { font-size: 15px; font-weight: 700; }
.banner .what { font-size: 13px; opacity: 0.9; margin-top: 4px; }
.table-wrap { overflow-x: auto; border: 1px solid #ececec; border-radius: 8px; }
table.plans { border-collapse: collapse; width: 100%; min-width: 900px; font-size: 13px; }
table.plans thead { background: #f7f7f8; }
table.plans th, table.plans td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #ececec; vertical-align: top; }
table.plans th { font-weight: 700; color: #111; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; }
table.plans th .cn { font-weight: 400; font-size: 10px; color: #6b7280; display: block; margin-top: 2px; text-transform: none; letter-spacing: 0; }
table.plans td.plan-ref { font-family: ui-monospace, "SF Mono", Monaco, monospace; font-weight: 700; color: #111; white-space: nowrap; }
table.plans td.context { font-size: 12px; color: #6b7280; white-space: nowrap; }
table.plans td input, table.plans td select, table.plans td textarea { width: 100%; padding: 8px 10px; border: 1px solid #d6d9de; border-radius: 6px; font-size: 13px; font-family: inherit; background: white; -webkit-appearance: none; min-width: 100px; }
table.plans td input:focus, table.plans td textarea:focus { outline: 2px solid #E63946; outline-offset: -1px; border-color: transparent; }
.prior-pill { display: inline-block; font-size: 11px; background: #fef3e2; color: #b45309; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
.muted { color: #9ca3af; font-style: italic; }
.btn { padding: 12px 18px; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s; border: 1px solid #d6d9de; font-family: inherit; background: white; color: #111; letter-spacing: 0.02em; }
.btn-primary { background: #E63946; color: white; border-color: #E63946; }
.btn-primary:hover { background: #c92e3a; border-color: #c92e3a; }
.btn-primary:disabled { background: #d6d9de; border-color: #d6d9de; cursor: not-allowed; }
/* r31h — was green primary-d, now FK red (single theme for all freight partner actions) */
.btn-primary-d { background: #E63946; color: white; border-color: #E63946; }
.btn-primary-d:hover { background: #c92e3a; border-color: #c92e3a; }
.btn-secondary { background: #f7f7f8; }
.btn-sm { padding: 7px 12px; font-size: 12px; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111; color: white; padding: 11px 22px; border-radius: 8px; font-size: 14px; z-index: 200; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
.toast.error { background: #c0392b; }
/* r31h — success toast now FK red (was green) */
.toast.success { background: #E63946; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.12); border-top-color: #E63946; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading { padding: 40px; text-align: center; color: #6b7280; }
.error-box { background: #fdecea; color: #c0392b; padding: 18px; border-radius: 8px; font-size: 14px; text-align: center; }
/* r31h — thanks-box now FK red themed (was green) */
.thanks-box { background: #fff5f5; border: 1px solid rgba(230,57,70,0.25); color: #E63946; padding: 22px; border-radius: 10px; text-align: center; font-size: 15px; line-height: 1.6; }
.thanks-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 10px; color: #E63946; }
.actions-bar { margin-top: 18px; display: flex; justify-content: flex-end; gap: 10px; }
.prior-row { background: #fafbfc; }
.prior-row td { font-size: 12px; color: #4a5568; padding-top: 4px; padding-bottom: 6px; border-bottom: 1px solid #ececec; }
.prior-row .label { font-weight: 600; color: #9ca3af; text-transform: uppercase; font-size: 10px; letter-spacing: 0.04em; }
.footer { background: #000; color: rgba(255,255,255,0.7); padding: 16px 24px; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
.footer .left .name { color: white; font-weight: 600; }
.footer .left .contact { opacity: 0.5; margin-top: 2px; }
.footer .ver { opacity: 0.4; }
@media (max-width: 600px) {
  .topbar, .logobar, .footer { padding-left: 16px; padding-right: 16px; }
  .logobar img { height: 42px; }
}
</style>
</head>
<body>
<div class="topbar">
  <span class="left">FK Sports — Freight Partner Portal</span>
  <span class="right">EN / 中文</span>
</div>
<div class="logobar">
  <img src="/static/fk-logo.png" alt="FK Sports">
  <span class="tag">Feel the difference</span>
</div>
<div class="wrap">
  <div id="app"><div class="loading"><div class="spinner"></div> Loading… / 加载中…</div></div>
</div>
<div class="footer">
  <div class="left">
    <div class="name">FK Sports</div>
    <div class="contact">fksports.co.uk · info@fksports.co.uk</div>
  </div>
  <span class="ver">v31l</span>
</div>
<script>
const TOKEN = location.pathname.split('/').pop();
let MODEL = null;

function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(s) { if (!s) return ''; if (typeof s === 'string' && /^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10); try { return new Date(s).toISOString().slice(0,10); } catch(e) { return ''; } }
function fmtMoney(n) { if (n == null || n === '') return ''; const v = parseFloat(n); if (isNaN(v)) return ''; return '$' + v.toLocaleString(undefined,{ minimumFractionDigits:0, maximumFractionDigits:2 }); }

function toast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 3500);
}

async function load() {
  try {
    const r = await fetch('/q/api/' + TOKEN);
    if (!r.ok) {
      const e = await r.json().catch(function(){ return {error:'Failed'}; });
      document.getElementById('app').innerHTML = '<div class="card"><div class="error-box">' + escapeHtml(e.error || 'This link is not valid.') + '<br><br>请联系FK Sports / Please contact FK Sports.</div></div>';
      return;
    }
    MODEL = await r.json();
    render();
  } catch(e) {
    document.getElementById('app').innerHTML = '<div class="card"><div class="error-box">Connection error / 连接错误: ' + escapeHtml(e.message) + '</div></div>';
  }
}

function priorQuoteFor(planId) {
  if (!MODEL || !MODEL.prior_quotes) return null;
  // Use the most recent submission for that plan, by this agent
  const list = MODEL.prior_quotes.filter(function(q){ return q.plan_id === planId; });
  if (!list.length) return null;
  return list[list.length - 1];
}

function render() {
  if (!MODEL) return;
  if (MODEL.kind === 'quote') renderQuote();
  else if (MODEL.kind === 'delivery') renderDelivery();
  else document.getElementById('app').innerHTML = '<div class="card"><div class="error-box">Unknown link type</div></div>';
}

function renderQuote() {
  const m = MODEL;
  let html = '';
  html += '<div class="card">';
  html += '  <div class="banner banner-q"><div class="who">' + escapeHtml(m.agent.name) + '</div><div class="what">Quote request for ' + m.plans.length + ' plan(s) / ' + m.plans.length + ' 份订单的报价请求</div></div>';
  html += '  <h1>Please quote on the following plans <span class="cn">请对以下订单报价</span></h1>';
  html += '  <div class="intro">For each plan, enter one row per option. You may offer multiple shipping lines / arrival ports — use <strong>+ Add option</strong> to add another row.<span class="cn">请为每个订单填写一行。如有多个船公司/到达港选择，请点击 <strong>+ 添加选项</strong> 增加一行。</span></div>';

  for (const p of m.plans) {
    const readyDate = p.actual_loading_date || p.approx_loading_date || '';
    const priorsForPlan = (m.prior_quotes || []).filter(function(q){ return q.plan_id === p.id; });

    html += '<div class="plan-block" data-plan-id="' + p.id + '" style="margin-top:18px;border:1px solid rgba(0,0,0,0.08);border-radius:10px;overflow:hidden">';
    // r31i — Bigger, labelled header block. Was small grey italic muted text that buried critical quote info.
    html += '  <div class="plan-header-r31i" style="background:linear-gradient(135deg,#fff,#fff5f5);padding:14px 18px;border-bottom:1px solid #ececec">';
    html += '    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:10px">';
    html += '      <div style="font-size:18px;font-weight:700;color:#111;font-family:ui-monospace,Monaco,monospace;letter-spacing:-0.2px">' + escapeHtml(p.plan_number) + '</div>';
    html += '      <button type="button" class="btn btn-sm btn-secondary" onclick="addOption(' + p.id + ')">+ Add option / 添加选项</button>';
    html += '    </div>';
    html += '    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px">';
    html += '      <div><div style="font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#9a5a1d;margin-bottom:2px">CRD / 装柜日</div>';
    html += '        <div style="font-size:14px;font-weight:600;color:#111">' + (fmtDate(readyDate) || '—') + '</div></div>';
    html += '      <div><div style="font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#9a5a1d;margin-bottom:2px">Port / 装运港</div>';
    html += '        <div style="font-size:14px;font-weight:600;color:#111">' + escapeHtml(p.loading_port || '—') + '</div></div>';
    html += '      <div><div style="font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#9a5a1d;margin-bottom:2px">Supplier / 供应商</div>';
    html += '        <div style="font-size:13px;font-weight:600;color:#111">' + escapeHtml(p.supplier_name || '—') + '</div></div>';
    if (p.supplier_order_ref) {
      html += '      <div><div style="font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#9a5a1d;margin-bottom:2px">Order ref / 订单号</div>';
      html += '        <div style="font-size:13px;font-weight:600;color:#111">' + escapeHtml(p.supplier_order_ref) + '</div></div>';
    }
    html += '    </div>';
    html += '  </div>';
    html += '  <div class="table-wrap"><table class="plans options-table"><thead><tr>';
    html += '    <th>Shipping line<br><span class="cn">船公司</span></th>';
    html += '    <th>Arrival port<br><span class="cn">到达港</span></th>';
    html += '    <th>ETD<br><span class="cn">开船日</span></th>';
    html += '    <th>ETA<br><span class="cn">预计到达</span></th>';
    html += '    <th>TT (days)<br><span class="cn">运输时间</span></th>';
    html += '    <th>DM (days)<br><span class="cn">滞期免费</span></th>';
    html += '    <th>DT (days)<br><span class="cn">滞箱免费</span></th>';
    html += '    <th>Price USD<br><span class="cn">价格</span></th>';
    html += '    <th>Validity<br><span class="cn">有效期</span></th>';
    html += '    <th>Notes<br><span class="cn">备注</span></th>';
    html += '    <th></th>';
    html += '  </tr></thead><tbody class="options-body" data-plan-id="' + p.id + '">';
    // Start with one blank row
    html += optionRowHtml(p.id, null);
    html += '  </tbody></table></div>';

    // Prior submissions block
    if (priorsForPlan.length) {
      html += '<div style="background:#fafbfc;padding:10px 14px;border-top:1px solid rgba(0,0,0,0.06);font-size:12px;color:#4a5568">';
      html += '<div style="font-weight:600;font-size:11px;color:#8a97a8;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px">Previously submitted by you · ' + priorsForPlan.length + '</div>';
      for (const pq of priorsForPlan) {
        const bits = [];
        if (pq.shipping_line) bits.push(escapeHtml(pq.shipping_line));
        if (pq.arrival_port)  bits.push('→ ' + escapeHtml(pq.arrival_port));
        if (pq.price != null) bits.push('$' + pq.price);
        if (pq.etd_date)      bits.push('ETD ' + fmtDate(pq.etd_date));
        if (pq.eta_date)      bits.push('ETA ' + fmtDate(pq.eta_date));
        bits.push('<em style="color:#8a97a8">' + escapeHtml(pq.status) + '</em>');
        const isStruck = pq.status === 'rejected' || pq.status === 'expired';
        html += '<div style="padding:4px 0' + (isStruck ? ';text-decoration:line-through;color:#8a97a8' : '') + '">· ' + bits.join(' · ') + ' <span style="color:#8a97a8">(' + fmtDate(pq.submitted_at) + ')</span></div>';
      }
      html += '</div>';
    }

    html += '</div>';
  }

  html += '  <div class="actions-bar"><button class="btn btn-primary" onclick="submitQuote()">Submit quotes / 提交报价</button></div>';
  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

// Build one editable option row (called for initial + Add option)
function optionRowHtml(planId, prior) {
  const v = function(k) { return prior && prior[k] != null ? prior[k] : ''; };
  return '<tr class="option-row" data-plan-id="' + planId + '">' +
    '<td><input type="text" data-f="shipping_line" placeholder="Maersk / MSC / CMA…" value="' + escapeHtml(v('shipping_line')) + '"></td>' +
    '<td><input type="text" data-f="arrival_port" placeholder="Felixstowe / London Gateway" value="' + escapeHtml(v('arrival_port')) + '"></td>' +
    '<td><input type="date" data-f="etd_date" value="' + escapeHtml(fmtDate(v('etd_date'))) + '"></td>' +
    '<td><input type="date" data-f="eta_date" value="' + escapeHtml(fmtDate(v('eta_date'))) + '"></td>' +
    '<td><input type="number" min="0" data-f="transit_time_days" placeholder="0" value="' + escapeHtml(v('transit_time_days')) + '"></td>' +
    '<td><input type="number" min="0" data-f="demurrage_days" placeholder="0" value="' + escapeHtml(v('demurrage_days')) + '"></td>' +
    '<td><input type="number" min="0" data-f="detention_days" placeholder="0" value="' + escapeHtml(v('detention_days')) + '"></td>' +
    '<td><input type="number" min="0" step="0.01" data-f="price" placeholder="0.00" value="' + escapeHtml(v('price')) + '"></td>' +
    '<td><input type="date" data-f="validity_date" value="' + escapeHtml(fmtDate(v('validity_date'))) + '"></td>' +
    '<td><textarea data-f="notes" rows="1" placeholder="Optional">' + escapeHtml(v('notes')) + '</textarea></td>' +
    '<td><button type="button" class="btn btn-sm" style="padding:4px 8px" onclick="removeOption(this)" title="Remove">×</button></td>' +
  '</tr>';
}

function addOption(planId) {
  const body = document.querySelector('.options-body[data-plan-id="' + planId + '"]');
  if (!body) return;
  const tmp = document.createElement('tbody');
  tmp.innerHTML = optionRowHtml(planId, null);
  body.appendChild(tmp.firstChild);
}

function removeOption(btn) {
  const tr = btn.closest('tr.option-row');
  if (!tr) return;
  const body = tr.parentElement;
  // Keep at least one row per plan
  if (body && body.querySelectorAll('tr.option-row').length <= 1) {
    // Just clear the row instead of removing
    tr.querySelectorAll('input, textarea').forEach(function(el){ el.value = ''; });
    return;
  }
  tr.remove();
}

function renderDelivery() {
  const m = MODEL;
  let html = '';
  html += '<div class="card">';
  // r31j — Delivery booking goes to Origin Logistics (UK haulier). English-only.
  html += '  <div class="banner banner-d"><div class="who">' + escapeHtml(m.agent.name) + '</div><div class="what">Delivery booking for ' + m.plans.length + ' container(s)</div></div>';
  html += '  <h1>Please confirm delivery for the following containers</h1>';
  html += '  <div class="intro">Enter the booked delivery date, transport reference, and driver/contact for each container.</div>';

  html += '  <div class="table-wrap"><table class="plans">';
  html += '    <thead><tr>';
  html += '      <th>Plan</th>';
  html += '      <th>Container</th>';
  html += '      <th>BL number</th>';
  html += '      <th>ETA</th>';
  html += '      <th>Destination</th>';
  html += '      <th>Delivery date</th>';
  html += '      <th>Transport ref</th>';
  html += '      <th>Driver/contact</th>';
  html += '      <th>Notes</th>';
  html += '    </tr></thead><tbody>';

  for (const p of m.plans) {
    const eta = p.new_eta || p.original_eta || '';
    const dispo = p.disposition || '';
    let dest = '';
    // r31k — destination single value: where the freight agent actually drives to.
    if (dispo === 'kemballs' || dispo === 'campbells') dest = 'Kemballs depot';
    else if (dispo === 'clean') dest = 'FK Sports warehouse';
    else dest = '—';
    html += '<tr data-plan-id="' + p.id + '">';
    html += '  <td class="plan-ref">' + escapeHtml(p.plan_number) + (p.supplier_order_ref ? '<div class="muted" style="font-weight:400">Your ref: ' + escapeHtml(p.supplier_order_ref) + '</div>' : '') + '</td>';
    html += '  <td class="context">' + escapeHtml(p.container_number || '—') + '</td>';
    html += '  <td class="context">' + escapeHtml(p.bl_number || '—') + '</td>';
    html += '  <td class="context">' + fmtDate(eta) + '</td>';
    html += '  <td class="context">' + escapeHtml(dest) + '</td>';
    html += '  <td><input type="date" data-f="delivery_date"></td>';
    html += '  <td><input type="text" data-f="transport_ref" placeholder="e.g. job ref"></td>';
    html += '  <td><input type="text" data-f="driver" placeholder="Name + phone"></td>';
    html += '  <td><textarea data-f="notes" rows="1"></textarea></td>';
    html += '</tr>';
  }
  html += '    </tbody></table></div>';
  html += '  <div class="actions-bar"><button class="btn btn-primary-d" onclick="submitDelivery()">Submit booking</button></div>';
  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

function collectRows() {
  const rows = [];
  const trs = document.querySelectorAll('tr[data-plan-id]');
  trs.forEach(function(tr) {
    const planId = parseInt(tr.getAttribute('data-plan-id'));
    const row = { plan_id: planId };
    tr.querySelectorAll('[data-f]').forEach(function(el) {
      row[el.getAttribute('data-f')] = el.value;
    });
    rows.push(row);
  });
  return rows;
}

async function submitQuote() {
  await submitGeneric();
}
async function submitDelivery() {
  await submitGeneric();
}

async function submitGeneric() {
  const rows = collectRows();
  const btn = document.querySelector('.actions-bar button');
  btn.disabled = true;
  const original = btn.textContent;
  btn.innerHTML = '<span class="spinner"></span> Submitting…';
  try {
    const r = await fetch('/q/api/' + TOKEN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rows: rows })
    });
    const data = await r.json();
    if (!r.ok) {
      toast(data.error || 'Submission failed', 'error');
      btn.disabled = false;
      btn.textContent = original;
      return;
    }
    showThanks(data.accepted || [], data.skipped || []);
  } catch(e) {
    toast('Network error: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = original;
  }
}

function showThanks(accepted, skipped) {
  // r31j — Delivery booking is English-only (Origin UK haulier). Quote form stays bilingual
  //   (some freight partners are Chinese-speaking).
  const isDelivery = MODEL && MODEL.kind === 'delivery';
  let html = '<div class="card"><div class="thanks-box">';
  if (isDelivery) {
    html += '  <h2>Thank you</h2>';
    html += '  <div>Your submission has been received.</div>';
  } else {
    html += '  <h2>Thank you / 谢谢</h2>';
    html += '  <div>Your submission has been received.<br>您的提交已收到。</div>';
  }
  html += '  <div style="margin-top:10px;font-size:13px;color:#4a5568">' + accepted.length + ' plan(s) recorded';
  if (skipped.length) {
    const empties = skipped.filter(function(s){return s.reason==='empty';}).length;
    if (empties) html += ' · ' + empties + ' left blank';
  }
  html += '</div>';
  if (isDelivery) {
    html += '  <div style="margin-top:14px;font-size:12px;color:#8a97a8">FK Sports will be in touch shortly.</div>';
  } else {
    html += '  <div style="margin-top:14px;font-size:12px;color:#8a97a8">FK Sports will be in touch shortly. / FK Sports将很快与您联系。</div>';
  }
  html += '</div></div>';
  document.getElementById('app').innerHTML = html;
}

load();
</script>
</body>
</html>
